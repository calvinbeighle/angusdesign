<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angus Designs</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f8f8f8; /* Slightly off-white background */
      color: #4a4a4a; /* Slightly off-black text */
      font-family: 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
      font-weight: 100; /* Ultra Light */
      font-size: 3rem;
    }
    .call-link {
      position: absolute;
      bottom: 50px; /* Adds margin below */
      font-size: 0.9rem; /* Very small font */
      color: #4a4a4a; /* Slightly off-black */
      letter-spacing: 0.5px;
      font-family: 'Helvetica', 'Helvetica', sans-serif;
      font-weight: 400; /* Ultra Light */
      text-decoration: none; /* Removes the underline */
    }
    .centered-text {
      transform: translateY(-40px); /* Moves the text up by 75px */
    }
  </style>
</head>
<body>
    <div class="centered-text">angus made this</div>
  <a href="tel:+14062036674" class="call-link">CALL</a>
</body>
</html>
